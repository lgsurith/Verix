services:
  verix:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    volumes:
      - ./private-key.pem:/app/private-key.pem:ro
    restart: unless-stopped

  # --- Optional services (uncomment what you need) ---

